name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Install TypeScript
        run: npm install -D typescript

      - name: Remove existing capacitor config
        run: rm -f capacitor.config.ts

      - name: Init Capacitor
        run: npx cap init "WintoBlox - Alpha Version" org.wintozo.wintoblox --web-dir "client/version 0.1.0-alpha/static"

      - name: Add Android Platform
        run: npx cap add android

      - name: Set Android SDK versions
        run: |
          cd android
          sed -i "s/minSdkVersion = .*/minSdkVersion = 26/" variables.gradle
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 34/" variables.gradle
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 35/" variables.gradle

      - name: Fix Kotlin duplicate classes
        run: |
          cd android
          cat >> app/build.gradle << 'EOF'
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.20'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.20'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.20'
              }
          }
          EOF
          cat app/build.gradle

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WintoBlox-Android-Debug
          path: android/app/build/outputs/apk/debug/*.apk
