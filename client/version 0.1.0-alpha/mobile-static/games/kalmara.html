<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Красный цвет, зеленый цвет - 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        #light-ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; border-radius: 14px; font-size: 22px;
            font-weight: bold; z-index: 10; transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); pointer-events: none;
            text-align: center; border: 2px solid;
        }
        #light-ui.green { background: #00ff00; color: #000; border-color: #00ff00; }
        #light-ui.red { background: #ff0000; color: #fff; border-color: #ff0000; }
        #hud {
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 14px; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 8px;
            pointer-events: none;
        }
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-between; z-index: 10;
            pointer-events: none;
        }
        #ui button {
            pointer-events: auto; padding: 8px 16px; font-size: 13px;
            background: #0ea5e9; color: white; border: none;
            border-radius: 8px; cursor: pointer;
        }
        #msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; font-weight: bold; z-index: 20; text-align: center;
            display: none; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px;
            border: 3px solid #e94560;
        }
        #msg .s { font-size: 16px; margin-top: 15px; color: #aaa; }
        #msg button {
            margin-top: 15px; padding: 12px 35px; font-size: 18px;
            background: #e94560; color: white; border: none;
            border-radius: 10px; cursor: pointer;
        }
        #pbar {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 500px; height: 6px;
            background: rgba(255,255,255,0.1); border-radius: 3px; z-index: 10;
        }
        #pfill { height: 100%; background: #4ecca3; border-radius: 3px; width: 0%; transition: width 0.2s; }
        
        #mob { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 100; }
        .mob-row { display: flex; gap: 6px; }
        .mb { width: 60px; height: 60px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; cursor: pointer; user-select: none; touch-action: manipulation; }
        .mb:active { background: rgba(78,204,163,0.4); border-color: #4ecca3; }
        .mb img { width: 24px; height: 24px; pointer-events: none; filter: brightness(0) invert(1); }
        #mbJump { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: rgba(233,69,96,0.4); border: 2px solid rgba(233,69,96,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; z-index: 100; cursor: pointer; user-select: none; }
        #mbJump:active { background: rgba(233,69,96,0.7); }
        
    </style>
</head>
<body>
    <div id="light-ui" class="green">🟢 ЗЕЛЕНЫЙ — МОЖНО ИДТИ</div>
    <div id="hud">Прогресс: 0%</div>
    <div id="ui">
        <button onclick="goBack()">← Назад</button>
        <button onclick="resetGame()">↺ Заново</button>
    </div>
    <div id="msg"></div>
    <div id="pbar"><div id="pfill"></div></div>
    
    <div id="mob">
        <button class="mb" id="mbW"><img src="../../static/ypravlenie_knopki_strelki/vverh.svg"></button>
        <div class="mob-row">
            <button class="mb" id="mbA"><img src="../../static/ypravlenie_knopki_strelki/vleva.svg"></button>
            <button class="mb" id="mbS"><img src="../../static/ypravlenie_knopki_strelki/vniz.svg"></button>
            <button class="mb" id="mbD"><img src="../../static/ypravlenie_knopki_strelki/vprava.svg"></button>
        </div>
    </div>
    <button id="mbJump">ПРЫЖОК</button>
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 120);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.prepend(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404060));
        const dl = new THREE.DirectionalLight(0xffffff, 0.8);
        dl.position.set(10, 20, 10); dl.castShadow = true;
        scene.add(dl);

        // Floor
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2c2c54, roughness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 80), floorMat);
        floor.rotation.x = -Math.PI / 2; floor.position.set(0, 0, 25); floor.receiveShadow = true;
        scene.add(floor);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x40407a, roughness: 0.6 });
        const wl = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 80), wallMat);
        wl.position.set(-8, 1.5, 25); scene.add(wl);
        const wr = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 80), wallMat);
        wr.position.set(8, 1.5, 25); scene.add(wr);

        // Lines
        const lm = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
        for (let z = 1; z < 70; z += 3) {
            const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-7, 0.02, z), new THREE.Vector3(7, 0.02, z)]);
            scene.add(new THREE.Line(g, lm));
        }

        // Start/finish
        const sm = new THREE.MeshStandardMaterial({ color: 0x00d2d3, emissive: 0x00d2d3, emissiveIntensity: 0.2 });
        const sz = new THREE.Mesh(new THREE.PlaneGeometry(14, 3), sm);
        sz.rotation.x = -Math.PI / 2; sz.position.set(0, 0.02, 1); scene.add(sz);
        const fm = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.3 });
        const fz = new THREE.Mesh(new THREE.PlaneGeometry(14, 3), fm);
        fz.rotation.x = -Math.PI / 2; fz.position.set(0, 0.02, 65); scene.add(fz);

        // Lasers - red beams to jump over
        const laserMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0000, 
            emissive: 0xff0000, 
            emissiveIntensity: 0.8,
            transparent: true,
            opacity: 0.7
        });
        const lasers = [];
        const laserConfigs = [
            { z: 18, height: 0.6 },
            { z: 28, height: 0.8 },
            { z: 38, height: 0.5 },
            { z: 48, height: 0.9 },
            { z: 55, height: 0.7 }
        ];
        laserConfigs.forEach(cfg => {
            // Laser beam
            const laser = new THREE.Mesh(new THREE.BoxGeometry(14, 0.08, 0.08), laserMat);
            laser.position.set(0, cfg.height, cfg.z);
            scene.add(laser);
            
            // Laser emitters (walls)
            const leftEmitter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), laserMat);
            leftEmitter.position.set(-7, cfg.height, cfg.z);
            scene.add(leftEmitter);
            
            const rightEmitter = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), laserMat);
            rightEmitter.position.set(7, cfg.height, cfg.z);
            scene.add(rightEmitter);
            
            lasers.push({ z: cfg.z, height: cfg.height, active: true });
        });
        const obsMat = new THREE.MeshStandardMaterial({ color: 0x8b0000, emissive: 0x8b0000, emissiveIntensity: 0.3 });
        const obstacles = [];
        // Obstacles at different X positions
        const obsConfigs = [
            { z: 12, x: -3, width: 2 },
            { z: 22, x: 2, width: 1.5 },
            { z: 32, x: 0, width: 2.5 },
            { z: 42, x: -4, width: 1.8 },
            { z: 52, x: 3, width: 2 },
            { z: 58, x: -2, width: 1.5 }
        ];
        obsConfigs.forEach(cfg => {
            const obs = new THREE.Mesh(new THREE.BoxGeometry(cfg.width, 0.8, 0.3), obsMat);
            obs.position.set(cfg.x, 0.4, cfg.z); scene.add(obs);
            obstacles.push({ z: cfg.z, x: cfg.x, width: cfg.width / 2 });
        });

        // Player (Bekon)
        const player = new THREE.Group();
        player.position.set(0, 0, 2);
        player.castShadow = true;
        scene.add(player);
        const fallback = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.3, 0.5), new THREE.MeshStandardMaterial({ color: 0x4ecca3 }));
        fallback.position.y = 0.65;
        player.add(fallback);

        if (typeof THREE.GLTFLoader !== 'undefined') {
            new THREE.GLTFLoader().load('/static/models/source/model_1.glb', (gltf) => {
                player.remove(fallback);
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const s = 1.3 / size.y;
                model.scale.set(s, s, s);
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * s, -box.min.y * s, -center.z * s);
                model.traverse(c => { if (c.isMesh) c.castShadow = true; });
                player.add(model);
            });
        }

        // Traffic light
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 4), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        pole.position.set(0, 2, -1); scene.add(pole);
        const rl = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0 }));
        rl.position.set(0, 3.2, -1); scene.add(rl);
        const gl = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 1 }));
        gl.position.set(0, 2.2, -1); scene.add(gl);

        // Instructions
        const inst = new THREE.Mesh(new THREE.PlaneGeometry(12, 2), new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.3,
            side: THREE.DoubleSide
        }));
        inst.position.set(0, 1.5, 10);
        scene.add(inst);

        // Game state
        let px = 0, pz = 2, py = 0, vy = 0;
        let light = 'green', over = false, won = false, timer = null;
        const keys = {};

        function kDown(k) { return keys[k] === true; }

        function sched() {
            if (timer) clearTimeout(timer);
            timer = setTimeout(() => {
                if (over || won) return;
                light = light === 'green' ? 'red' : 'green';
                const ui = document.getElementById('light-ui');
                ui.className = light;
                ui.textContent = light === 'green' ? '🟢 ЗЕЛЕНЫЙ — МОЖНО ИДТИ' : '🔴 КРАСНЫЙ — СТОЯТЬ!';
                rl.material.emissiveIntensity = light === 'red' ? 1 : 0;
                gl.material.emissiveIntensity = light === 'green' ? 1 : 0;
                sched();
            }, Math.floor(Math.random() * 8000) + 2000);
        }

        function showMsg(text, win) {
            const m = document.getElementById('msg');
            m.style.display = 'block';
            m.innerHTML = text + '<div class="s">Нажмите "Заново"</div><br><button onclick="resetGame()">Играть снова</button>';
            m.style.color = win ? '#ffd700' : '#ff4444';
        }

        function resetGame() {
            px = 0; pz = 2; py = 0; vy = 0; over = false; won = false; light = 'green';
            player.position.set(0, 0, 2);
            document.getElementById('msg').style.display = 'none';
            document.getElementById('pfill').style.width = '0%';
            document.getElementById('hud').textContent = 'Прогресс: 0%';
            if (timer) clearTimeout(timer);
            document.getElementById('light-ui').className = 'green';
            document.getElementById('light-ui').textContent = '🟢 ЗЕЛЕНЫЙ — МОЖНО ИДТИ';
            rl.material.emissiveIntensity = 0;
            gl.material.emissiveIntensity = 1;
            sched();
        }

        function goBack() {
            if (timer) clearTimeout(timer);
            window.location.href = '/lobby/{{ device }}';
        }

        // Keyboard handling for both layouts and arrow keys
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            const code = e.code;
            
            // Map physical keys to logical actions (independent of keyboard layout)
            if (code === 'KeyW' || code === 'ArrowUp') keys['w'] = true;
            if (code === 'KeyA' || code === 'ArrowLeft') keys['a'] = true;
            if (code === 'KeyS' || code === 'ArrowDown') keys['s'] = true;
            if (code === 'KeyD' || code === 'ArrowRight') keys['d'] = true;
            if (code === 'Space') keys[' '] = true;
            
            // Russian layout support
            if (key === 'ц' || key === 'w') keys['ц'] = true;
            if (key === 'ф' || key === 'a') keys['ф'] = true;
            if (key === 'ы' || key === 's') keys['ы'] = true;
            if (key === 'в' || key === 'd') keys['в'] = true;
            
            // Also set the original key for compatibility
            keys[key] = true;
        });
        
        document.addEventListener('keyup', e => {
            const key = e.key.toLowerCase();
            const code = e.code;
            
            if (code === 'KeyW' || code === 'ArrowUp') keys['w'] = false;
            if (code === 'KeyA' || code === 'ArrowLeft') keys['a'] = false;
            if (code === 'KeyS' || code === 'ArrowDown') keys['s'] = false;
            if (code === 'KeyD' || code === 'ArrowRight') keys['d'] = false;
            if (code === 'Space') keys[' '] = false;
            
            if (key === 'ц' || key === 'w') keys['ц'] = false;
            if (key === 'ф' || key === 'a') keys['ф'] = false;
            if (key === 'ы' || key === 's') keys['ы'] = false;
            if (key === 'в' || key === 'd') keys['в'] = false;
            
            keys[key] = false;
        });

        // Camera mouse
        let camYaw = 0, isMD = false, lX;
        renderer.domElement.addEventListener('mousedown', e => { isMD = true; lX = e.clientX; });
        window.addEventListener('mousemove', e => { if (!isMD) return; camYaw -= (e.clientX - lX) * 0.005; lX = e.clientX; });
        window.addEventListener('mouseup', () => isMD = false);

        renderer.domElement.addEventListener('touchstart', e => {
            if (e.target.closest('.mb') || e.target.id === 'mbJump') return;
            if (e.touches.length === 1) { isMD = true; lX = e.touches[0].clientX; }
        }, { passive: false });
        renderer.domElement.addEventListener('touchmove', e => {
            if (!isMD || e.touches.length !== 1) return;
            camYaw -= (e.touches[0].clientX - lX) * 0.008; lX = e.touches[0].clientX;
        }, { passive: false });
        renderer.domElement.addEventListener('touchend', () => isMD = false);

        
        function mobBtn(id, k) {
            const el = document.getElementById(id);
            if (!el) return;
            const down = e => { e.preventDefault(); keys[k] = true; };
            const up = e => { e.preventDefault(); keys[k] = false; };
            el.addEventListener('touchstart', down, { passive: false });
            el.addEventListener('touchend', up);
            el.addEventListener('touchcancel', up);
            el.addEventListener('mousedown', down);
            el.addEventListener('mouseup', up);
            el.addEventListener('mouseleave', up);
        }
        mobBtn('mbW', 'ц'); mobBtn('mbA', 'ф'); mobBtn('mbS', 'ы'); mobBtn('mbD', 'в'); mobBtn('mbJump', ' ');
        

        function update() {
            if (over || won) return;

            const forward = kDown('w') || kDown('ц');
            const back = kDown('s') || kDown('ы');
            const left = kDown('a') || kDown('ф');
            const right = kDown('d') || kDown('в');

            const dz = (forward ? 1 : 0) - (back ? 1 : 0);
            const dx = (right ? 1 : 0) - (left ? 1 : 0);

            const isMoving = dz !== 0 || dx !== 0;

            if (isMoving) {
                if (light === 'red') {
                    over = true;
                    showMsg('💀 Ты проиграл!<br>Красный свет — стоять!');
                    return;
                }
                const angle = Math.atan2(dx, dz) + camYaw;
                // Slower speed: 0.05 instead of 0.08
                px += Math.sin(angle) * 0.05;
                pz += Math.cos(angle) * 0.05;
                player.rotation.y = -angle;
            }

            // Jump
            if (kDown(' ') && py <= 0.05) { vy = 0.18; keys[' '] = false; }
            vy -= 0.008; py += vy;
            if (py < 0) { py = 0; vy = 0; }

            // Laser collision - must jump over!
            for (const laser of lasers) {
                if (Math.abs(pz - laser.z) < 0.4 && py < laser.height + 0.1) {
                    over = true;
                    showMsg('💀 Ты проиграл!<br>Лазер тебя сжег!');
                    return;
                }
            }

            // Obstacle collision - check if player is at obstacle Z and X position
            for (const obs of obstacles) {
                if (Math.abs(pz - obs.z) < 0.6 && Math.abs(px - obs.x) < obs.width && py < 0.6) {
                    // Push player back
                    pz = obs.z - 0.8;
                }
            }

            // Wall bounds
            px = Math.max(-7, Math.min(7, px));

            player.position.set(px, py, pz);

            // Progress
            const prog = Math.min(100, ((pz - 2) / 60) * 100);
            document.getElementById('pfill').style.width = prog + '%';
            document.getElementById('hud').textContent = 'Прогресс: ' + Math.floor(prog) + '%';

            if (pz >= 63) {
                won = true;
                showMsg('🎉 Победа!<br>Ты дошел до конца!', true);
            }
        }

        function anim() {
            requestAnimationFrame(anim);
            update();
            // Camera follows player
            camera.position.x = px + Math.sin(camYaw) * 8;
            camera.position.z = pz - 6;
            camera.position.y = 5;
            camera.lookAt(px, 1, pz + 4);
            renderer.render(scene, camera);
        }
        sched();
        anim();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
