<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Побег от Бр Бр Патапима - WintoBlox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        #hud {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 18px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 10px 24px; border-radius: 12px;
            pointer-events: none; text-align: center; border: 2px solid #ff0000;
        }
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-between; z-index: 100;
            pointer-events: none;
        }
        #ui button {
            pointer-events: auto; padding: 10px 20px; font-size: 14px;
            background: #2e7d32; color: white; border: none;
            border-radius: 10px; cursor: pointer;
        }
        #dead {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(139,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 200; color: white;
        }
        #dead h1 { font-size: 50px; margin-bottom: 20px; }
        #dead button { padding: 15px 40px; font-size: 20px; background: white; color: darkred; border: none; border-radius: 12px; cursor: pointer; }
        
        #mob { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 100; }
        .mob-row { display: flex; gap: 6px; }
        .mb { width: 60px; height: 60px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; touch-action: manipulation; }
        .mb:active { background: rgba(78,204,163,0.4); border-color: #4ecca3; }
        .mb img { width: 24px; height: 24px; pointer-events: none; filter: brightness(0) invert(1); }
        #mbJump { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: rgba(233,69,96,0.4); border: 2px solid rgba(233,69,96,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; z-index: 100; cursor: pointer; user-select: none; }
        #mbJump:active { background: rgba(233,69,96,0.7); }
        
    </style>
</head>
<body>
    <div id="ui"><button onclick="location.href='/lobby/{{ device }}'">← Выход</button></div>
    <div id="hud">УБЕГАЙ ОТ ПАТАПИМА!<br><small>WASD + Пробел | Мышь — камера</small></div>
    <div id="dead"><h1>ТЫ ПОЙМАН!</h1><button onclick="location.reload()">ПОПРОБОВАТЬ СНОВА</button></div>
    
    <div id="mob">
        <button class="mb" id="mbW"><img src="../../static/ypravlenie_knopki_strelki/vverh.svg"></button>
        <div class="mob-row">
            <button class="mb" id="mbA"><img src="../../static/ypravlenie_knopki_strelki/vleva.svg"></button>
            <button class="mb" id="mbS"><img src="../../static/ypravlenie_knopki_strelki/vniz.svg"></button>
            <button class="mb" id="mbD"><img src="../../static/ypravlenie_knopki_strelki/vprava.svg"></button>
        </div>
    </div>
    <button id="mbJump">ПРЫЖОК</button>
    

    <audio id="bgMusic" src="../../static/models/patapim/brrr-brrr-patapim.mp3" loop></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        // ===================== SCENE =====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0a0a);
        scene.fog = new THREE.Fog(0x1a0a0a, 5, 40);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0x331111, 0.5));
        const torch = new THREE.PointLight(0xffaa55, 1.5, 25);
        scene.add(torch);

        // ===================== ROOM =====================
        const roomSize = 40, roomH = 8;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a1a1a, roughness: 0.9 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1111, roughness: 0.95 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0x0a0505, roughness: 1 });

        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomSize, roomSize), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Ceiling
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomSize, roomSize), ceilMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = roomH;
        scene.add(ceiling);

        // Walls with thickness
        function makeWall(w, h, x, z, ry) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.8), wallMat);
            wall.position.set(x, h / 2, z);
            wall.rotation.y = ry;
            wall.receiveShadow = true;
            scene.add(wall);
        }
        makeWall(roomSize, roomH, 0, -roomSize / 2, 0);
        makeWall(roomSize, roomH, 0, roomSize / 2, 0);
        makeWall(roomSize, roomH, -roomSize / 2, 0, Math.PI / 2);
        makeWall(roomSize, roomH, roomSize / 2, 0, Math.PI / 2);

        // Corner pillars
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x3a2222 });
        const corners = [[-18, -18], [18, -18], [-18, 18], [18, 18]];
        corners.forEach(([x, z]) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(2, roomH, 2), pillarMat);
            p.position.set(x, roomH / 2, z);
            p.castShadow = true;
            scene.add(p);
        });

        // Windows (dark glass)
        const windowMat = new THREE.MeshStandardMaterial({ color: 0x0a0a1a, emissive: 0x000033, emissiveIntensity: 0.3, transparent: true, opacity: 0.7 });
        const windows = [
            { x: 0, z: -20, ry: 0 },
            { x: 0, z: 20, ry: 0 },
            { x: -20, z: 0, ry: Math.PI / 2 },
            { x: 20, z: 0, ry: Math.PI / 2 }
        ];
        windows.forEach(win => {
            const winMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 0.3), windowMat);
            winMesh.position.set(win.x, 4, win.z);
            winMesh.rotation.y = win.ry;
            scene.add(winMesh);
        });

        // Interior obstacles/props
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x4a3333, roughness: 0.8 });
        const obstacles = [];
        
        // Tables/barriers
        const tableConfigs = [
            { x: -10, z: -10, w: 4, d: 2, h: 1.5 },
            { x: 10, z: -8, w: 3, d: 4, h: 1.5 },
            { x: -8, z: 12, w: 5, d: 2, h: 1.5 },
            { x: 12, z: 10, w: 3, d: 3, h: 1.5 },
            { x: 0, z: 0, w: 2, d: 2, h: 3 } // tall pillar in center
        ];
        
        tableConfigs.forEach(cfg => {
            const table = new THREE.Mesh(new THREE.BoxGeometry(cfg.w, cfg.h, cfg.d), obstacleMat);
            table.position.set(cfg.x, cfg.h / 2, cfg.z);
            table.castShadow = true;
            table.receiveShadow = true;
            scene.add(table);
            obstacles.push({ x: cfg.x, z: cfg.z, halfW: cfg.w / 2, halfD: cfg.d / 2, height: cfg.h });
        });
        
        // Crates/barriers
        const crateMat = new THREE.MeshStandardMaterial({ color: 0x5a4444 });
        const crateConfigs = [
            { x: -12, z: 5 },
            { x: 15, z: -5 },
            { x: -5, z: -15 },
            { x: 8, z: 15 }
        ];
        crateConfigs.forEach(cfg => {
            const crate = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), crateMat);
            crate.position.set(cfg.x, 1, cfg.z);
            crate.castShadow = true;
            scene.add(crate);
            obstacles.push({ x: cfg.x, z: cfg.z, halfW: 1, halfD: 1, height: 2 });
        });

        // ===================== PLAYER =====================
        const player = new THREE.Group();
        scene.add(player);
        const fallback = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.4, 0.4), new THREE.MeshStandardMaterial({ color: 0x4ecca3 }));
        fallback.position.y = 0.7;
        player.add(fallback);

        if (typeof THREE.GLTFLoader !== 'undefined') {
            new THREE.GLTFLoader().load('/static/models/source/model_1.glb', (gltf) => {
                player.remove(fallback);
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const s = 1.4 / size.y;
                model.scale.set(s, s, s);
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * s, -box.min.y * s, -center.z * s);
                model.traverse(c => { if (c.isMesh) c.castShadow = true; });
                player.add(model);
            }, undefined, (err) => console.error('Бекон ошибка:', err));
        }

        // ===================== PATAPIM =====================
        const patapim = new THREE.Group();
        scene.add(patapim);
        const patFallback = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: 0x8b0000 }));
        patFallback.position.y = 1.25;
        patapim.add(patFallback);

        if (typeof THREE.GLTFLoader !== 'undefined') {
            new THREE.GLTFLoader().load('/static/models/patapim/brr_brr_patapim.glb', (gltf) => {
                patapim.remove(patFallback);
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const s = 2.2 / size.y;
                model.scale.set(s, s, s);
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * s, -box.min.y * s, -center.z * s);
                model.traverse(c => { if (c.isMesh) c.castShadow = true; });
                patapim.add(model);
                console.log('Патапим загружен!');
            }, undefined, (err) => console.error('Патапим ошибка:', err));
        }
        patapim.position.set(15, 0, 15);

        // ===================== CAMERA =====================
        let camYaw = Math.PI, camPitch = 0.3;
        const keys = {};
        const music = document.getElementById('bgMusic');

        function kDown(k) { return keys[k] === true; }

        // ===================== INPUT =====================
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            const code = e.code;
            
            if (code === 'KeyW' || code === 'ArrowUp') keys['w'] = true;
            if (code === 'KeyA' || code === 'ArrowLeft') keys['a'] = true;
            if (code === 'KeyS' || code === 'ArrowDown') keys['s'] = true;
            if (code === 'KeyD' || code === 'ArrowRight') keys['d'] = true;
            if (code === 'Space') keys[' '] = true;
            
            if (key === 'ц' || key === 'w') keys['ц'] = true;
            if (key === 'ф' || key === 'a') keys['ф'] = true;
            if (key === 'ы' || key === 's') keys['ы'] = true;
            if (key === 'в' || key === 'd') keys['в'] = true;
            
            keys[key] = true;
        });
        
        document.addEventListener('keyup', e => {
            const key = e.key.toLowerCase();
            const code = e.code;
            
            if (code === 'KeyW' || code === 'ArrowUp') keys['w'] = false;
            if (code === 'KeyA' || code === 'ArrowLeft') keys['a'] = false;
            if (code === 'KeyS' || code === 'ArrowDown') keys['s'] = false;
            if (code === 'KeyD' || code === 'ArrowRight') keys['d'] = false;
            if (code === 'Space') keys[' '] = false;
            
            if (key === 'ц' || key === 'w') keys['ц'] = false;
            if (key === 'ф' || key === 'a') keys['ф'] = false;
            if (key === 'ы' || key === 's') keys['ы'] = false;
            if (key === 'в' || key === 'd') keys['в'] = false;
            
            keys[key] = false;
        });

        // Mouse camera with pitch
        let isMD = false, lX, lY;
        renderer.domElement.addEventListener('mousedown', e => { 
            isMD = true; 
            lX = e.clientX;
            lY = e.clientY;
        });
        window.addEventListener('mousemove', e => {
            if (!isMD) return;
            camYaw -= (e.clientX - lX) * 0.005;
            camPitch += (e.clientY - lY) * 0.003;
            camPitch = Math.max(-0.5, Math.min(1.2, camPitch));
            lX = e.clientX;
            lY = e.clientY;
        });
        window.addEventListener('mouseup', () => isMD = false);

        // Touch camera
        renderer.domElement.addEventListener('touchstart', e => {
            if (e.target.closest('.mb') || e.target.id === 'mbJump') return;
            if (e.touches.length === 1) { isMD = true; lX = e.touches[0].clientX; lY = e.touches[0].clientY; }
        }, { passive: false });
        renderer.domElement.addEventListener('touchmove', e => {
            if (!isMD || e.touches.length !== 1) return;
            camYaw -= (e.touches[0].clientX - lX) * 0.008;
            camPitch += (e.touches[0].clientY - lY) * 0.005;
            camPitch = Math.max(-0.5, Math.min(1.2, camPitch));
            lX = e.touches[0].clientX;
            lY = e.touches[0].clientY;
        }, { passive: false });
        renderer.domElement.addEventListener('touchend', () => isMD = false);

        
        function mobBtn(id, k) {
            const el = document.getElementById(id);
            if (!el) return;
            const down = e => { e.preventDefault(); keys[k] = true; };
            const up = e => { e.preventDefault(); keys[k] = false; };
            el.addEventListener('touchstart', down, { passive: false });
            el.addEventListener('touchend', up);
            el.addEventListener('touchcancel', up);
            el.addEventListener('mousedown', down);
            el.addEventListener('mouseup', up);
            el.addEventListener('mouseleave', up);
        }
        mobBtn('mbW', 'ц'); mobBtn('mbA', 'ф'); mobBtn('mbS', 'ы'); mobBtn('mbD', 'в'); mobBtn('mbJump', ' ');
        

        // ===================== UPDATE =====================
        function update() {
            const speed = 0.12;
            const forward = kDown('w') || kDown('ц');
            const back = kDown('s') || kDown('ы');
            const left = kDown('a') || kDown('ф');
            const right = kDown('d') || kDown('в');

            const dz = (forward ? 1 : 0) - (back ? 1 : 0);
            const dx = (right ? 1 : 0) - (left ? 1 : 0);

            if (dx !== 0 || dz !== 0) {
                const angle = Math.atan2(dx, dz) + camYaw;
                px += Math.sin(angle) * speed;
                pz += Math.cos(angle) * speed;
                player.rotation.y = -angle;
            }

            // Jump
            if (kDown(' ') && py <= 0.05) { vy = 0.18; keys[' '] = false; }
            vy -= 0.008;
            py += vy;
            if (py < 0) { py = 0; vy = 0; }

            // Bounds
            const bound = roomSize / 2 - 1.5;
            px = Math.max(-bound, Math.min(bound, px));
            pz = Math.max(-bound, Math.min(bound, pz));

            // Obstacle collision
            for (const obs of obstacles) {
                if (Math.abs(px - obs.x) < obs.halfW + 0.3 && 
                    Math.abs(pz - obs.z) < obs.halfD + 0.3 && 
                    py < obs.height) {
                    // Push player away from obstacle
                    const pushDir = Math.atan2(pz - obs.z, px - obs.x);
                    px += Math.sin(pushDir) * 0.2;
                    pz += Math.cos(pushDir) * 0.2;
                }
            }

            player.position.set(px, py, pz);
            torch.position.set(px, py + 2, pz);

            // Patapim AI
            const dist = Math.sqrt((px - patapim.position.x) ** 2 + (pz - patapim.position.z) ** 2);
            if (dist > 0.5) {
                const ang = Math.atan2(px - patapim.position.x, pz - patapim.position.z);
                patapim.position.x += Math.sin(ang) * 0.07;
                patapim.position.z += Math.cos(ang) * 0.07;
                patapim.rotation.y = ang;
            }

            // Music
            if (dist < 15) {
                if (music.paused) music.play().catch(() => {});
                music.volume = Math.max(0.1, 1 - dist / 15);
            } else {
                music.pause();
            }

            if (dist < 1.2) {
                document.getElementById('dead').style.display = 'flex';
            }

            // Camera - follows player with pitch control
            const cd = 7;
            const ch = 3 + Math.sin(camPitch) * 4;
            const cdist = Math.cos(camPitch) * cd;
            camera.position.x = px + Math.sin(camYaw) * cdist;
            camera.position.y = py + ch;
            camera.position.z = pz + Math.cos(camYaw) * cdist;
            camera.lookAt(px, py + 1.2, pz);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
