<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WintoBlox - Alpha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1000;
        }
        .logo-screen img {
            width: 300px;
            height: 300px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="logo-screen">
        <img src="static/icons/logos/logo/wintoblox_big_logo_green_and_blue.svg" alt="WintoBlox">
    </div>

    <script>
        // Проверить, есть ли сохраненные данные пользователя
        const savedUser = localStorage.getItem('winto-user');
        const savedModel = localStorage.getItem('winto-model');
        
        setTimeout(() => {
            if (savedUser && savedModel) {
                // Уже зарегистрирован - сразу в лобби
                window.location.href = 'wintoblox-mobile-lobby-menu.html';
            } else {
                // Нужна регистрация
                window.location.href = 'registration.html';
            }
        }, 3000);
    </script>
</body>
</html>
</body>
</html>
