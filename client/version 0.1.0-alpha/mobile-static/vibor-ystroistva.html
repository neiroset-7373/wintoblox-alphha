<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WintoBlox - Выбор устройства</title>
    <link rel="stylesheet" href="../static/css/vibor-ystroistva.css">
</head>
<body>
    <div class="vibor-container">
        <div class="vibor-card">
            <div class="logo-wrapper">
                <img src="../static/icons/logos/bolshoe_logo.svg" alt="WintoBlox" class="main-logo">
            </div>
            <h1 class="vibor-title">WintoBlox</h1>
            <p class="vibor-subtitle">Выберите ваше устройство</p>
            <div class="vibor-buttons">
                <button class="vibor-btn" onclick="selectDevice('computer')">
                    <img src="../static/icons/logos/computer.svg" alt="Компьютер">
                    <span>Компьютер</span>
                </button>
                <button class="vibor-btn" onclick="selectDevice('mobile')">
                    <img src="../static/icons/logos/phone.svg" alt="Телефон">
                    <span>Телефон</span>
                </button>
            </div>
            <p class="vibor-hint">Выбор можно изменить позже в настройках</p>
        </div>
    </div>

    <script>
        function selectDevice(device) {
            fetch('/api/select-device', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({device: device})
            }).then(() => {
                localStorage.setItem('wintoblox-device', device);
                window.location.href = '/lobby/' + device;
            });
        }

        // Если уже выбрано - сразу перенаправляем
        const saved = localStorage.getItem('wintoblox-device');
        if (saved) {
            window.location.href = '/lobby/' + saved;
        }
    </script>
</body>
</html>
