<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WintoBlox - Alpha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 48px; margin-bottom: 30px; }
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #4ecca3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #45b08c; }
    </style>
</head>
<body>
    <h1>🎮 WintoBlox Alpha</h1>
    <a href="/lobby/computer" class="btn">🖥️ На ПК</a>
    <a href="/lobby/mobile" class="btn">📱 На телефоне</a>
</body>
</html>
