<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WintoBlox - Лобби</title>
    <link rel="stylesheet" href="/static/css/wintoblox-lobby.css">
    <style>
        .model-display {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
            font-size: 14px;
            color: #aaa;
        }
        .model-icon-small {
            font-size: 20px;
        }
        .change-model-btn {
            background: none;
            border: 1px solid #4ecca3;
            color: #4ecca3;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .logout-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="custom-cursor">
        <img src="/static/icons/control/mouse.svg" alt="cursor">
    </div>

    <div class="lobby-container">
        <div class="logo-container">
            <img src="/static/icons/logos/logo/bolshoe_logo.svg" alt="WintoBlox" class="main-logo" id="mainLogo">
        </div>

        <div class="lobby-header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div>
                    <span class="user-name" id="usernameDisplay">User</span>
                    <div class="model-display">
                        <span class="model-icon-small" id="modelIcon">⬜</span>
                        <span id="modelName">Не выбрана</span>
                        <button class="change-model-btn" onclick="changeModel()">Сменить</button>
                    </div>
                </div>
            </div>
            <div class="header-buttons">
                <button class="skin-btn" onclick="changeSkin()">Сменить скин</button>
                <button class="device-btn" onclick="resetDevice()">Сменить устройство</button>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="skin-notification" id="skinNotif"></div>

        <div class="games-grid">
            <div class="game-card">
                <div class="game-title">Побег от Бр Бр Патапима</div>
                <div class="game-desc">Убегай от монстра!</div>
                <button class="play-btn" onclick="playGame('computer', 'pobeg_vmesto_obby_wintoblox')">
                    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="white"/></svg>
                </button>
            </div>
            <div class="game-card">
                <div class="game-title">Красный цвет, зеленый цвет</div>
                <div class="game-desc">3D игра в кальмара</div>
                <button class="play-btn" onclick="playGame('computer', 'kalmara')">
                    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="white"/></svg>
                </button>
            </div>
            <div class="game-card disabled">
                <div class="game-title">Игра 3</div>
                <div class="game-desc">Скоро...</div>
                <button class="play-btn" disabled>
                    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="white"/></svg>
                </button>
            </div>
        </div>

        <div class="lobby-footer">
            <button class="studio-btn" disabled>Winto Studio</button>
        </div>
    </div>

    <script>
        // Проверка авторизации
        function checkAuth() {
            fetch('/api/user')
                .then(res => {
                    if (res.status === 401) {
                        window.location.href = '/registration';
                        return null;
                    }
                    return res.json();
                })
                .then(data => {
                    if (!data) return;
                    loadUserData(data);
                })
                .catch(err => {
                    console.error('Auth error:', err);
                    window.location.href = '/registration';
                });
        }

        function loadUserData(userData) {
            // Отобразить никнейм
            document.getElementById('usernameDisplay').textContent = userData.username;
            
            // Отобразить аватар (первая буква ника)
            const avatar = document.getElementById('userAvatar');
            avatar.textContent = userData.username.charAt(0).toUpperCase();
            
            // Отобразить модель
            const modelIcon = document.getElementById('modelIcon');
            const modelName = document.getElementById('modelName');
            
            if (userData.model === 'bekon') {
                modelIcon.textContent = '🥓';
                modelName.textContent = 'Бекон';
            } else if (userData.model === 'cube') {
                modelIcon.textContent = '⬜';
                modelName.textContent = 'Куб';
            }
            
            // Цвет аватара на основе ника
            const colors = ['#4ecca3', '#e94560', '#0f3460', '#00d2d3', '#ffd700'];
            const hash = userData.username.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            avatar.style.backgroundColor = colors[hash % colors.length];
        }

        function playGame(device, gameId) {
            window.location.href = '/game/' + device + '/' + gameId;
        }

        function changeSkin() {
            const colors = ['#4ecca3', '#e94560', '#0f3460', '#00d2d3', '#ffd700'];
            const idx = Math.floor(Math.random() * colors.length);
            document.getElementById('userAvatar').style.backgroundColor = colors[idx];
            const notif = document.getElementById('skinNotif');
            notif.textContent = 'Цвет изменен!';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 1500);
        }

        function changeModel() {
            if (confirm('Сменить модельку? Вы перейдете на страницу выбора модели.')) {
                window.location.href = '/registration#model';
            }
        }

        function resetDevice() {
            localStorage.removeItem('wintoblox-device');
            window.location.href = '/';
        }

        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                fetch('/api/logout', { method: 'POST' })
                    .then(() => {
                        window.location.href = '/';
                    });
            }
        }

        // Смена большого логотипа каждые 2:33 (153 секунды)
        const logos = [
            '/static/icons/logos/logo/bolshoe_logo.svg',
            '/static/icons/logos/logo/wintoblox_big_logo_green_and_blue.svg'
        ];
        let logoIdx = 0;
        setInterval(() => {
            logoIdx = (logoIdx + 1) % logos.length;
            document.getElementById('mainLogo').src = logos[logoIdx];
        }, 153000);

        // Кастомный курсор
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.body.style.cursor = 'none';

        // Инициализация
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
